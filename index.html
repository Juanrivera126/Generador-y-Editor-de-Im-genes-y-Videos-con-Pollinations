<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Generador Pollinations (BYOP + Pan/Zoom)</title>
    <link rel="stylesheet" href="styles.css">
</head>

<body>

    <div class="language-selector">
        <select id="languageSelect" onchange="changeLanguage(this.value)">
            <option value="es">🇪🇸 Español</option>
            <option value="en">🇬🇧 English</option>
            <option value="fr">🇫🇷 Français</option>
        </select>
    </div>

    <div class="container">
        <div class="tabs">
            <button class="tab-btn active" onclick="switchTab('image')">Imágenes</button>
            <button class="tab-btn" onclick="switchTab('video')">Videos</button>
        </div>

        <div id="tab-image" class="content">
            <div class="controls">
                <div class="api-key-container">
                    <label for="apiKeyInput">Pollinations API Key</label>
                    <div class="api-row">
                        <input type="password" id="apiKeyInput" placeholder="plln_sk_..." onchange="saveKeyLocally()">
                        <button id="getApiKeyBtn" onclick="startAuthFlow()">🔑 Obtener</button>
                    </div>
                </div>

                <div id="gen-controls-group">
                    <div>
                        <label>Modelo</label>
                        <select id="img_model"></select>
                    </div>

                    <div>
                        <div class="row" style="justify-content: space-between;">
                            <label>Prompt</label>
                            <button class="trash-btn" onclick="clearPrompt('img_prompt')">🗑️</button>
                        </div>
                        <textarea id="img_prompt">Cinco lindas brujas caminando por París</textarea>
                    </div>

                    <div>
                        <label>Dimensiones</label>
                        <select id="img_ratio" onchange="updateBoxSize()">
                            <option value="0">1:1 (1024x1024)</option>
                            <option value="1">3:4 (768x1024)</option>
                            <option value="2">4:3 (1024x768)</option>
                            <option value="3">16:9 (2048x1152)</option>
                            <option value="4">9:16 (1152x2048)</option>
                            <option value="5">3:2 (2048x1365)</option>
                            <option value="6">2:3 (1365x2048)</option>
                        </select>
                    </div>

                    <div>
                        <label>Estilo</label>
                        <select id="img_style">
                            <option value="selecciona">Selecciona</option>
                            <option value="1">3D</option>
                            <option value="2">Acuarela</option>
                            <option value="3">Arte callejero</option>
                            <option value="4">Arte digital</option>
                            <option value="5">Art Nouveau</option>
                            <option value="6">Arte Pop</option>
                            <option value="7">Barroco</option>
                            <option value="8">Blanco y negro</option>
                            <option value="9">Botero</option>
                            <option value="10">Cartoon</option>
                            <option value="11">Comic</option>
                            <option value="12">Cubismo</option>
                            <option value="13">Dibujo a lápiz</option>
                            <option value="14">Disney</option>
                            <option value="15">Expresionismo</option>
                            <option value="16">Fantasía</option>
                            <option value="17">Fauvismo</option>
                            <option value="0">Fotográfico</option>
                            <option value="19">Futurista</option>
                            <option value="20">Hiperrealista</option>
                            <option value="21">Ilustración</option>
                            <option value="22">Impresionismo</option>
                            <option value="23">Isométrico</option>
                            <option value="24">Japonés (Ukiyo-e)</option>
                            <option value="25">Japanese Woodblock</option>
                            <option value="26">Manga</option>
                            <option value="27">Minimalismo</option>
                            <option value="28">Neón</option>
                            <option value="29">Óleo</option>
                            <option value="30">Origami</option>
                            <option value="31">Pintura abstracta</option>
                            <option value="32">Pixar</option>
                            <option value="33">Pixelado</option>
                            <option value="34">Plastilina</option>
                            <option value="35">Realista</option>
                            <option value="36">Renacimiento</option>
                            <option value="37">Surrealismo</option>
                            <option value="38">Textura</option>
                            <option value="39">Van-Gogh</option>
                            <option value="40">Vintage</option>
                            <option value="41">Graffiti</option>
                            <option value="42">Vitral</option>
                            <option value="43">Mosaico</option>
                            <option value="44">Art Deco</option>
                            <option value="45">Steampunk</option>
                            <option value="46">Cyberpunk</option>
                            <option value="47">Vaporwave</option>
                            <option value="48">Low Poly</option>
                            <option value="49">Boceto</option>
                            <option value="50">Carboncillo</option>
                        </select>
                    </div>

                    <button class="action-btn" id="main-generate-btn" onclick="generateImage()">Generar Imagen</button>
                </div>

                <!-- Sección de Edición (Aparece después de generar) -->
                <div id="edit-section"
                    style="display:none; margin-top:10px; text-align: left; background: #eef7ff; padding: 10px; border-radius: 8px; border: 1px dashed #007eff;">
                    <label style="color: #007eff; font-weight: bold; display: block; margin-bottom: 2px;">✍️ Cambios a
                        realizar:</label>
                    <textarea id="edit_prompt" placeholder="Ej: Cambia las brujas por gatos con sombreros..."
                        style="width: 100%; border-radius: 6px; padding: 6px; border: 1px solid #007eff; height: 50px;"></textarea>
                    <button class="action-btn" onclick="applyEdit()"
                        style="margin-top: 5px; width: 100%; padding: 8px;">Aplicar cambios</button>
                    <button class="secondary-btn" id="btn-reset" onclick="resetToGeneration()"
                        style="margin-top: 8px; width: 100%; background-color: #666;">Reiniciar</button>
                </div>
            </div>

            <div class="preview">
                <h2 id="img_title" style="color:#007eff; margin: 0 0 5px 0;">Generador de Imágenes</h2>

                <div id="img_loading" class="loading-text">¡Generando imagen!</div>

                <!-- Contenedor para imagen única (como está ahora) -->
                <div id="img-container" onmousedown="startDrag(event)" onmousemove="drag(event)" onmouseup="endDrag()"
                    onmouseleave="endDrag()">
                    <img id="img-preview" src="" alt="Vista previa">
                </div>

                <!-- Contenedor para vista comparativa (Slider) -->
                <div id="imageComparisonContainer" class="comparison-container" style="display:none;">
                    <img id="original-comparison-image" src="" alt="Imagen original">
                    <div id="new-image-wrapper" class="comparison-image-wrapper">
                        <img id="new-comparison-image" src="" alt="Imagen editada">
                    </div>
                    <div id="comparison-slider" class="comparison-slider"></div>
                </div>

                <div class="zoom-control" id="zoom-area" style="display:none;">
                    <label for="scale-slider" style="font-size:14px; color:#0082fe;">Escala (Zoom)</label>
                    <input type="range" id="scale-slider" min="0.2" max="3" step="0.1" value="1"
                        oninput="updateScale(this.value)">
                </div>

                <div id="img-buttons" class="row" style="display:none; margin-top:15px;">
                    <button class="secondary-btn" id="btn-download" onclick="downloadImage()">Descargar imagen</button>
                    <button class="secondary-btn" id="btn-open" onclick="openImage()">Abrir imagen</button>
                </div>

                <!-- Botones para vista comparativa (Estilo Imagen Referencia) -->
                <div id="comparison-buttons"
                    style="display:none; margin-top:5px; width: 100%; display: flex; flex-direction: row; gap: 5px; justify-content: space-between; align-items: center;">
                    <div
                        style="display: flex; align-items: center; gap: 4px; background: #f0f7ff; padding: 4px; border-radius: 4px; border-left: 3px solid #007ef6; flex: 1;">
                        <span style="font-size: 12px; font-weight: bold; color: #0072df;" class="lbl-original">🖼️
                            Original</span>
                        <button class="comp-purple-btn" onclick="openImage('original')">Abrir</button>
                        <button class="comp-purple-btn" onclick="downloadImage('original')">Descargar</button>
                    </div>
                    <div
                        style="display: flex; align-items: center; gap: 4px; background: #eefbff; padding: 4px; border-radius: 4px; border-left: 3px solid #28a745; flex: 1;">
                        <span style="font-size: 12px; font-weight: bold; color: #28a745;" class="lbl-edited">✨
                            Editada</span>
                        <button class="comp-purple-btn" onclick="openImage('edited')">Abrir</button>
                        <button class="comp-purple-btn" onclick="downloadImage('edited')">Descargar</button>
                    </div>
                </div>
            </div>
        </div>

        <div id="tab-video" class="content hidden">
            <div class="controls">
                <div
                    style="background:#eef7ff; padding:5px; border-radius:4px; font-size:12px; margin-bottom:10px; color:#555;">
                    <i class="fas fa-info-circle"></i> Usa la API Key configurada en la pestaña Imágenes.
                </div>

                <div>
                    <label>Modelo</label>
                    <select id="vid_model"></select>
                </div>

                <div>
                    <div class="row"
                        style="justify-content: flex-start; gap: 15px; margin-bottom: 5px; flex-wrap: wrap;"
                        id="vid_input_source">
                        <label
                            style="margin-bottom:0; cursor:pointer; display:flex; align-items:center; gap:5px; font-size:13px;">
                            <input type="radio" name="vid_source" value="prompt" checked
                                onchange="toggleVideoPrompt(true)"> <span id="lbl_vid_prompt_src">Prompt de texto</span>
                        </label>
                        <label
                            style="margin-bottom:0; cursor:pointer; display:flex; align-items:center; gap:5px; font-size:13px;">
                            <input type="radio" name="vid_source" value="original" onchange="toggleVideoPrompt(false)">
                            <span id="lbl_vid_orig_src">Usar imagen original</span>
                        </label>
                        <label
                            style="margin-bottom:0; cursor:pointer; display:flex; align-items:center; gap:5px; font-size:13px;">
                            <input type="radio" name="vid_source" value="image" onchange="toggleVideoPrompt(false)">
                            <span id="lbl_vid_img_src">Usar imagen editada</span>
                        </label>
                    </div>
                    <div class="row" style="justify-content: space-between;">
                        <label id="lbl_vid_prompt">Prompt</label>
                        <button class="trash-btn" onclick="clearPrompt('vid_prompt')">🗑️</button>
                    </div>
                    <textarea id="vid_prompt">Cinco lindas brujas caminando por París</textarea>
                </div>

                <div>
                    <label>Dimensiones</label>
                    <select id="vid_ratio">
                        <option value="0">1:1 (640x640)</option>
                        <option value="1">3:4 (640x825)</option>
                        <option value="2">4:3 (640x480)</option>
                        <option value="3">16:9 (640x360)</option>
                        <option value="4">9:16 (464x825)</option>
                    </select>
                </div>

                <div>
                    <label>Duración</label>
                    <select id="vid_time">
                        <option value="0">2 seg</option>
                        <option value="1">4 seg</option>
                        <option value="2">6 seg</option>
                        <option value="3">8 seg</option>
                        <option value="4">10 seg</option>
                    </select>
                </div>

                <div>
                    <label>Estilo</label>
                    <select id="vid_style">
                        <option value="selecciona">Selecciona</option>
                        <option value="1">3D</option>
                        <option value="2">Acuarela</option>
                        <option value="3">Arte callejero</option>
                        <option value="4">Arte digital</option>
                        <option value="5">Art Nouveau</option>
                        <option value="6">Arte Pop</option>
                        <option value="7">Barroco</option>
                        <option value="8">Blanco y negro</option>
                        <option value="9">Botero</option>
                        <option value="10">Cartoon</option>
                        <option value="11">Comic</option>
                        <option value="12">Cubismo</option>
                        <option value="13">Dibujo a lápiz</option>
                        <option value="14">Disney</option>
                        <option value="15">Expresionismo</option>
                        <option value="16">Fantasía</option>
                        <option value="17">Fauvismo</option>
                        <option value="0">Fotográfico</option>
                        <option value="19">Futurista</option>
                        <option value="20">Hiperrealista</option>
                        <option value="21">Ilustración</option>
                        <option value="22">Impresionismo</option>
                        <option value="23">Isométrico</option>
                        <option value="24">Japonés (Ukiyo-e)</option>
                        <option value="25">Japanese Woodblock</option>
                        <option value="26">Manga</option>
                        <option value="27">Minimalismo</option>
                        <option value="28">Neón</option>
                        <option value="29">Óleo</option>
                        <option value="30">Origami</option>
                        <option value="31">Pintura abstracta</option>
                        <option value="32">Pixar</option>
                        <option value="33">Pixelado</option>
                        <option value="34">Plastilina</option>
                        <option value="35">Realista</option>
                        <option value="36">Renacimiento</option>
                        <option value="37">Surrealismo</option>
                        <option value="38">Textura</option>
                        <option value="39">Van-Gogh</option>
                        <option value="40">Vintage</option>
                        <option value="41">Graffiti</option>
                        <option value="42">Vitral</option>
                        <option value="43">Mosaico</option>
                        <option value="44">Art Deco</option>
                        <option value="45">Steampunk</option>
                        <option value="46">Cyberpunk</option>
                        <option value="47">Vaporwave</option>
                        <option value="48">Low Poly</option>
                        <option value="49">Boceto</option>
                        <option value="50">Carboncillo</option>
                    </select>
                </div>

                <button class="action-btn" onclick="generateVideo()">Generar Video</button>
            </div>

            <div class="preview">
                <h2 style="color:#007eff; margin: 0 0 5px 0;">Generador de Videos</h2>
                <div id="vid_loading" class="loading-text">¡Generando video!</div>
                <iframe id="vid-iframe" src="" style="display:none; width: 600px; height: 400px;"></iframe>
            </div>
        </div>
    </div>

    <footer id="app-footer"
        style="width: 1100px; margin: 20px auto; text-align:center; padding: 20px 0; color: #666; font-size: 13px; line-height: 1.6; border-top: 1px solid #ddd;">
        Diseñado por <strong>Juan Guillermo Rivera Berrío</strong> con las API de Pollinations, tecnología Gemini 1.5
        Flash y asistencia de Antigravity
    </footer>

    <div id="toast" class="toast"></div>
    <script src="script.js"></script>
</body>

</html>
